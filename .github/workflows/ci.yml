name: ci

on:
  push:
    branches:
      - main
  pull_request:
  merge_group:

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install test dependencies
        run: python -m pip install --upgrade pip -r requirements-test.txt

      - name: Run tests
        run: PYTEST_DISABLE_PLUGIN_AUTOLOAD=1 python -m pytest -q

  compose-config:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate canonical compose files exist
        run: |
          test -f compose.yaml
          test -f compose.dev.yaml

      - name: Prepare env file
        run: cp .env.example .env

      - name: Validate operator compose file
        run: docker compose -f compose.yaml config

      - name: Validate development compose overlay
        run: docker compose -f compose.yaml -f compose.dev.yaml config
