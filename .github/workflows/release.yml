name: release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  test-build-and-release:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install test dependencies
        run: python -m pip install --upgrade pip pytest==8.3.3

      - name: Validate tag matches VERSION
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          FILE_VERSION="$(cat VERSION | tr -d '[:space:]')"
          if [ "$TAG_VERSION" != "$FILE_VERSION" ]; then
            echo "Tag version ($TAG_VERSION) does not match VERSION ($FILE_VERSION)"
            exit 1
          fi

      - name: Run tests
        run: PYTEST_DISABLE_PLUGIN_AUTOLOAD=1 python -m pytest -q

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/mining-proxy-fee
          tags: |
            type=ref,event=tag
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Build release bundle and checksums
        run: |
          mkdir -p dist/release-bundle
          cp compose.yaml dist/release-bundle/
          cp .env.example dist/release-bundle/
          cp docs/UPGRADE.md docs/ROLLBACK.md docs/OPERATIONS.md dist/release-bundle/
          mkdir -p dist/release-bundle/deploy/v2raya
          cp deploy/v2raya/README.md dist/release-bundle/deploy/v2raya/

          tar -czf release-bundle.tar.gz -C dist/release-bundle .

          sha256sum compose.yaml > checksums.txt
          sha256sum .env.example >> checksums.txt
          sha256sum CHANGELOG.md >> checksums.txt
          sha256sum release-bundle.tar.gz >> checksums.txt

      - name: Build release notes from CHANGELOG
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"

          {
            echo "## ${GITHUB_REF_NAME}"
            echo
            awk -v ver="$TAG_VERSION" '
              $0 == "## " ver {flag=1; next}
              flag && /^## / {exit}
              flag {print}
            ' CHANGELOG.md
            echo
            echo "### Docker images"
            echo "- ghcr.io/${GITHUB_REPOSITORY_OWNER}/mining-proxy-fee:${GITHUB_REF_NAME}"
            echo "- ghcr.io/${GITHUB_REPOSITORY_OWNER}/mining-proxy-fee:latest"
            echo
            echo "### Assets"
            echo "- compose.yaml"
            echo "- .env.example"
            echo "- CHANGELOG.md"
            echo "- checksums.txt"
            echo "- release-bundle.tar.gz"
          } > RELEASE_NOTES.md

          if ! grep -q '^-' RELEASE_NOTES.md; then
            echo "Failed to extract changelog notes for version ${TAG_VERSION}"
            exit 1
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/mining-proxy-fee
          tags: |
            type=ref,event=tag
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Build release bundle and checksums
        run: |
          mkdir -p dist/release-bundle
          cp compose.yaml dist/release-bundle/
          cp .env.example dist/release-bundle/
          cp docs/UPGRADE.md docs/ROLLBACK.md docs/OPERATIONS.md dist/release-bundle/
          mkdir -p dist/release-bundle/deploy/v2raya
          cp deploy/v2raya/README.md dist/release-bundle/deploy/v2raya/

          tar -czf release-bundle.tar.gz -C dist/release-bundle .

          sha256sum compose.yaml > checksums.txt
          sha256sum .env.example >> checksums.txt
          sha256sum CHANGELOG.md >> checksums.txt
          sha256sum release-bundle.tar.gz >> checksums.txt

      - name: Build release notes from CHANGELOG
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"

          {
            echo "## ${GITHUB_REF_NAME}"
            echo
            awk -v ver="$TAG_VERSION" '
              $0 == "## " ver {flag=1; next}
              flag && /^## / {exit}
              flag {print}
            ' CHANGELOG.md
            echo
            echo "### Docker images"
            echo "- ghcr.io/${GITHUB_REPOSITORY_OWNER}/mining-proxy-fee:${GITHUB_REF_NAME}"
            echo "- ghcr.io/${GITHUB_REPOSITORY_OWNER}/mining-proxy-fee:latest"
            echo
            echo "### Assets"
            echo "- compose.yaml"
            echo "- .env.example"
            echo "- CHANGELOG.md"
            echo "- checksums.txt"
            echo "- release-bundle.tar.gz"
          } > RELEASE_NOTES.md

          if ! grep -q '^-' RELEASE_NOTES.md; then
            echo "Failed to extract changelog notes for version ${TAG_VERSION}"
            exit 1
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: RELEASE_NOTES.md
          files: |
            compose.yaml
            .env.example
            CHANGELOG.md
            checksums.txt
            release-bundle.tar.gz
