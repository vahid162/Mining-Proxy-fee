name: release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  test-build-and-release:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install test dependencies
        run: python -m pip install --upgrade pip pytest

      - name: Validate tag matches VERSION
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          FILE_VERSION="$(cat VERSION | tr -d '[:space:]')"
          if [ "$TAG_VERSION" != "$FILE_VERSION" ]; then
            echo "Tag version ($TAG_VERSION) does not match VERSION ($FILE_VERSION)"
            exit 1
          fi

      - name: Run tests
        run: python -m pytest -q

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/mining-proxy-fee
          tags: |
            type=ref,event=tag
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Build release bundle and checksums
        run: |
          mkdir -p dist/release-bundle
          cp compose.yaml dist/release-bundle/
          cp .env.example dist/release-bundle/
          cp docs/UPGRADE.md docs/ROLLBACK.md docs/OPERATIONS.md dist/release-bundle/
          mkdir -p dist/release-bundle/deploy/v2raya
          cp deploy/v2raya/README.md dist/release-bundle/deploy/v2raya/

          tar -czf release-bundle.tar.gz -C dist/release-bundle .

          sha256sum compose.yaml > checksums.txt
          sha256sum .env.example >> checksums.txt
          sha256sum CHANGELOG.md >> checksums.txt
          sha256sum release-bundle.tar.gz >> checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body: |
            Automated release for version ${{ github.ref_name }}.

            Docker images published:
            - ghcr.io/${{ github.repository_owner }}/mining-proxy-fee:${{ github.ref_name }}
            - ghcr.io/${{ github.repository_owner }}/mining-proxy-fee:latest

            Operator assets attached to this release:
            - compose.yaml
            - .env.example
            - CHANGELOG.md
            - checksums.txt
            - release-bundle.tar.gz
          files: |
            compose.yaml
            .env.example
            CHANGELOG.md
            checksums.txt
            release-bundle.tar.gz
