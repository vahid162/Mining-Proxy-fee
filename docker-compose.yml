services:
  v2raya:
    image: ${V2RAYA_IMAGE:-mzz2017/v2raya:latest}
    container_name: v2raya
    restart: unless-stopped
    expose:
      - "20170"
    ports:
      - "${V2RAYA_UI_BIND_HOST:-127.0.0.1}:${V2RAYA_UI_PORT:-2017}:2017"
    volumes:
      - ./deploy/v2raya:/etc/v2raya
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/127.0.0.1/20170' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    logging:
      driver: json-file
      options:
        max-size: "${DOCKER_LOG_MAX_SIZE:-20m}"
        max-file: "${DOCKER_LOG_MAX_FILE:-5}"

  fee-proxy:
    image: ${FEE_PROXY_IMAGE:-mining-proxy-fee}:${APP_VERSION:-0.4.10}
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fee-proxy
    restart: unless-stopped
    depends_on:
      v2raya:
        condition: service_healthy
    env_file:
      - .env
    ports:
      - "${LISTEN_PORT:-40040}:${LISTEN_PORT:-40040}"
      - "${METRICS_BIND_HOST:-127.0.0.1}:${METRICS_PORT:-9100}:${METRICS_PORT:-9100}"
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import os, urllib.request; urllib.request.urlopen(\"http://127.0.0.1:%s\" % os.getenv(\"METRICS_PORT\", \"9100\"), timeout=2).read()'"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "${DOCKER_LOG_MAX_SIZE:-20m}"
        max-file: "${DOCKER_LOG_MAX_FILE:-5}"

  simple-forwarder:
    image: ${GOST_IMAGE:-ginuerzh/gost:latest}
    container_name: simple-forwarder
    restart: unless-stopped
    depends_on:
      v2raya:
        condition: service_healthy
    command:
      - -L=tcp://0.0.0.0:${FORWARDER_LISTEN_PORT:-60046}/${FORWARDER_UPSTREAM_HOST:-bitcoin.viabtc.io}:${FORWARDER_UPSTREAM_PORT:-3333}
      - -F=socks5://v2raya:20170
    ports:
      - "${FORWARDER_LISTEN_PORT:-60046}:${FORWARDER_LISTEN_PORT:-60046}"
    logging:
      driver: json-file
      options:
        max-size: "${DOCKER_LOG_MAX_SIZE:-20m}"
        max-file: "${DOCKER_LOG_MAX_FILE:-5}"
